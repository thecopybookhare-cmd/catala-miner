<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<title>CatalàMiner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css?v=0.3.1">
</head>
<body>
<header>
  <h1 id="brand">🐈 CatalàMiner</h1>
  <div id="anki-badge" class="badge" title="Clica per configurar el port d'AnkiConnect">Anki…</div>
</header>

<main id="home">
  <section class="new-session">
    <label class="filebtn">📁 Obrir arxiu local
      <input type="file" id="file-input" accept="video/*,audio/*,.mkv,.srt,.vtt">
    </label>
    <div class="yt">
      <input type="url" id="yt-url" placeholder="Enganxa URL de YouTube…">
      <button id="yt-btn">⬇️ Importar</button>
    </div>
  </section>
  <section>
    <h2>Sessions</h2>
    <ul id="session-list"></ul>
  </section>
</main>

<main id="player" hidden>
  <div id="player-top">
    <button id="back">← Sessions</button>
    <div id="transcribe-bar">
      <select id="model-select">
        <option value="catala-large">Whisper large-v3 català (AINA)</option>
        <option value="large-v3">Whisper large-v3 genèric</option>
        <option value="small">Whisper small — ràpid</option>
      </select>
      <button id="transcribe-btn">🎙️ Transcriure</button>
      <label class="filebtn small">📎 .srt
        <input type="file" id="subs-input" accept=".srt,.vtt">
      </label>
      <progress id="job-progress" max="1" value="0" hidden></progress>
      <span id="job-msg"></span>
    </div>
  </div>

  <div id="stage">
    <div id="video-col">
      <div id="video-wrap">
        <video id="video" playsinline></video>
        <div id="overlay-sub">
          <div id="overlay-ca"></div>
          <div id="overlay-es" hidden></div>
        </div>
      </div>
      <div id="controls">
        <button class="icon" id="play-btn" title="Reproduir/Pausar (espai)">▶</button>
        <button class="icon" id="prev-btn" title="Frase anterior (A / ←)">⏮</button>
        <button class="icon" id="replay-btn" title="Repetir frase (S / ↓)">⟲</button>
        <button class="icon" id="next-btn" title="Frase següent (D / →)">⏭</button>
        <span id="time-cur" class="tlabel">0:00</span>
        <input type="range" id="seek" min="0" max="1000" value="0">
        <span id="time-dur" class="tlabel">0:00</span>
        <button class="icon toggle" id="dual-btn" title="Subtítol dual espanyol (E)">🇪🇸</button>
        <button class="icon toggle" id="autopause-btn" title="Auto-pausa per frase (P)">⏯</button>
        <button class="icon toggle" id="browser-btn" title="Navegador de subtítols (G)">📜</button>
        <button class="icon" id="fs-btn" title="Pantalla completa (F)">⛶</button>
      </div>
      <div id="help-line">A/D frase · S repetir · Q crear targeta (paraula sota el cursor) · W amaga subs · E dual · G transcripció · C copiar · F pantalla completa</div>
    </div>
    <aside id="side-panel" hidden>
      <div id="subs"></div>
    </aside>
  </div>
</main>

<aside id="card-panel" hidden>
  <h3>Nova targeta</h3>
  <div class="row"><label>Paraula</label><input id="c-paraula"></div>
  <div class="row"><label>Paraula ES</label><input id="c-paraula-es"></div>
  <div id="senses"></div>
  <div class="row"><label>Frase</label><textarea id="c-frase" rows="2"></textarea></div>
  <div class="row"><label>Frase ES</label><textarea id="c-frase-es" rows="2"></textarea></div>
  <div class="row meta"><span id="c-meta"></span></div>
  <div class="row">
    <audio id="c-audio" controls></audio>
    <button id="pad-before" title="Incloure segment anterior">⏪+</button>
    <button id="pad-after" title="Incloure segment següent">+⏩</button>
  </div>
  <img id="c-image" alt="">
  <div class="row actions">
    <button id="c-cancel">Cancel·lar</button>
    <button id="c-send" class="primary">➕ Afegir a Anki (⏎)</button>
  </div>
</aside>

<div id="word-pop" hidden>
  <div class="wp-head">
    <span id="wp-word"></span>
    <span id="wp-meta"></span>
    <button id="wp-close">✕</button>
  </div>
  <div id="wp-senses"></div>
  <div id="wp-word-es" class="wp-line"></div>
  <div id="wp-sentence-es" class="wp-line dim"></div>
  <div class="wp-actions">
    <button id="wp-replay">🔊 Repetir (S)</button>
    <button id="wp-card" class="primary">➕ Crear targeta (Q)</button>
  </div>
</div>

<div id="toast" hidden></div>
<script src="/app.js?v=0.3.1"></script>
</body>
</html>
